blueprint:
  name: Sequential Cover Control
  description: >
    Open or close multiple covers sequentially to avoid electrical stress.
    Waits for each cover to reach target position before starting the next one.
    Direction can be automatic (based on average position of covers).
    Optional debug logging can be enabled to trace each step.
    Note: when using set_position (partial open/close), an additional 1-second
    delay is applied after the command to allow the cover to register movement.
  domain: script
  source_url: https://github.com/NWItaly/HomeAssistant/blob/main/blueprints/script/sequential_cover_control.yaml
  homeassistant:
    min_version: "2024.8.0"

  input:
    covers:
      name: Covers
      description: Select covers to control in sequence (order matters)
      selector:
        entity:
          multiple: true
          domain: cover

    direction:
      name: Direction
      description: Direction to move covers. Use Auto to decide based on current position (average < 50 opens, >= 50 closes).
      default: auto
      selector:
        select:
          options:
            - label: "Auto"
              value: "auto"
            - label: "Open"
              value: "open"
            - label: "Close"
              value: "close"

    open_max:
      name: Max open position
      description: Target position when opening (0-100). Leave at 100 for fully open.
      default: 100
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    close_max:
      name: Max close position
      description: Target position when closing (0-100). Leave at 0 for fully closed.
      default: 0
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    delay_seconds:
      name: Delay between covers
      description: Wait time between each cover command (seconds). Default 0 means no delay.
      default: 0
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

    use_motor_sensor:
      name: Use motor_run_status sensor
      description: >
        If enabled, the script waits for the sensor sensor.COVER_NAME_motor_run_status
        to detect movement start and then return to 'Stop' instead of relying only on current_position.
        Enable only if your devices expose a sensor named exactly this way.
        Falls back to cover state/current_position if the sensor is unavailable.
      default: false
      selector:
        boolean:

    debug_logging:
      name: Enable debug logging
      description: >
        If enabled, writes progress messages to Logbook and System Log
        for each cover and step.
      default: false
      selector:
        boolean:

    start_wait_seconds:
      name: Timeout waiting for movement start
      description: >
        Maximum wait time for each cover to begin moving after the command is sent (seconds).
        If the cover does not start moving within this time, it is skipped and the script continues with the next one.
        Increase this value if your devices have high Zigbee/Z-Wave latency.
      default: 15
      selector:
        number:
          min: 3
          max: 60
          unit_of_measurement: seconds

    timeout_seconds:
      name: Timeout per cover
      description: >
        Maximum wait time for each cover to reach target position (seconds).
        If the cover does not complete movement within this time, the script continues with the next one.
      default: 120
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

variables:
  covers_list: !input covers
  timeout: !input timeout_seconds
  start_wait: !input start_wait_seconds
  delay: !input delay_seconds
  direction_input: !input direction
  open_max: !input open_max
  close_max: !input close_max
  use_motor_sensor: !input use_motor_sensor
  debug_logging: !input debug_logging

  # Guard against empty list before calling average
  avg_position: >
    {% set positions = covers_list
       | map('state_attr', 'current_position')
       | select('!=', None)
       | list %}
    {{ (positions | average) if positions | length > 0 else 50 }}

  resolved_direction: >
    {% if direction_input == 'auto' %}
      {% if avg_position | float < 50 %}open{% else %}close{% endif %}
    {% else %}
      {{ direction_input }}
    {% endif %}

  use_set_position: >
    {{ (resolved_direction == 'open' and (open_max | int(100)) != 100) or
       (resolved_direction == 'close' and (close_max | int(0)) != 0) }}

sequence:
  - repeat:
      for_each: "{{ covers_list }}"
      sequence:
        - variables:
            motor_sensor: "{{ 'sensor.' ~ repeat.item.split('.')[1] ~ '_motor_run_status' }}"
            has_motor_sensor: "{{ use_motor_sensor and states(motor_sensor) not in ['unavailable', 'unknown', 'none'] }}"

            target_position: >
              {% if resolved_direction == 'open' %}
                {{ open_max | int(100) }}
              {% else %}
                {{ close_max | int(0) }}
              {% endif %}

            command_service: >
              {% if use_set_position %}
                cover.set_cover_position
              {% elif resolved_direction == 'open' %}
                cover.open_cover
              {% else %}
                cover.close_cover
              {% endif %}

            cover_motion_state: >
              {% if resolved_direction == 'open' %}
                opening
              {% else %}
                closing
              {% endif %}

        # Separate block so target_position is guaranteed to be resolved first
        - variables:
            # Cover is skippable if unavailable, missing position, or already at target
            skip_cover: >
              {% if states(repeat.item) in ['unavailable', 'unknown'] %}
                true
              {% elif state_attr(repeat.item, 'current_position') == None %}
                true
              {% else %}
                {% set pos = state_attr(repeat.item, 'current_position') | int(-1) %}
                {% if resolved_direction == 'open' %}
                  {{ pos >= (target_position | int) }}
                {% else %}
                  {{ pos <= (target_position | int) }}
                {% endif %}
              {% endif %}

        # All operational logic is wrapped in a single choose so that skipping
        # a cover never aborts the repeat. (A failed condition inside repeat
        # would terminate the entire loop in HA.)
        - choose:
            - conditions: "{{ not skip_cover }}"
              sequence:
                - choose:
                    - conditions: "{{ debug_logging }}"
                      sequence:
                        - action: logbook.log
                          data:
                            name: Sequential Cover Control
                            message: >
                              Start {{ repeat.item }} | dir={{ resolved_direction }}
                              | service={{ command_service }}
                              | target={{ target_position }}
                              | current={{ state_attr(repeat.item, 'current_position') }}
                              | motor_sensor={{ motor_sensor if has_motor_sensor else 'n/a' }}
                            entity_id: "{{ repeat.item }}"
                            domain: cover
                        - action: system_log.write
                          data:
                            level: info
                            logger: homeassistant.components.script.sequential_cover_control
                            message: >
                              Start {{ repeat.item }} | dir={{ resolved_direction }}
                              | service={{ command_service }}
                              | target={{ target_position }}
                              | current={{ state_attr(repeat.item, 'current_position') }}
                              | motor_sensor={{ motor_sensor if has_motor_sensor else 'n/a' }}

                - choose:
                    - conditions: "{{ use_set_position }}"
                      sequence:
                        - action: cover.set_cover_position
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            position: "{{ target_position }}"
                  default:
                    - action: "{{ command_service }}"
                      target:
                        entity_id: "{{ repeat.item }}"

                - choose:
                    - conditions: "{{ debug_logging }}"
                      sequence:
                        - action: logbook.log
                          data:
                            name: Sequential Cover Control
                            message: >
                              Waiting start {{ repeat.item }}
                              | cover_state={{ states(repeat.item) }}
                              | motor_state={{ states(motor_sensor) if has_motor_sensor else 'n/a' }}
                            entity_id: "{{ repeat.item }}"
                            domain: cover

                # Wait for movement to begin.
                # continue_on_timeout: true — if the cover does not start moving
                # (e.g. Zigbee packet loss), log and skip to finish wait.
                - wait_template: >
                    {% if has_motor_sensor %}
                      {{ states(motor_sensor) | lower in ['forward', 'reverse'] }}
                    {% else %}
                      {{ states(repeat.item) == cover_motion_state }}
                    {% endif %}
                  timeout:
                    seconds: "{{ start_wait }}"
                  continue_on_timeout: true

                - choose:
                    - conditions: "{{ wait.completed }}"
                      sequence:
                        - choose:
                            - conditions: "{{ debug_logging }}"
                              sequence:
                                - action: logbook.log
                                  data:
                                    name: Sequential Cover Control
                                    message: >
                                      Movement started {{ repeat.item }}
                                      | cover_state={{ states(repeat.item) }}
                                      | motor_state={{ states(motor_sensor) if has_motor_sensor else 'n/a' }}
                                    entity_id: "{{ repeat.item }}"
                                    domain: cover

                        - choose:
                            - conditions: "{{ debug_logging }}"
                              sequence:
                                - action: logbook.log
                                  data:
                                    name: Sequential Cover Control
                                    message: >
                                      Waiting finish {{ repeat.item }}
                                      | target={{ target_position }}
                                      | current_position={{ state_attr(repeat.item, 'current_position') }}
                                      | motor_state={{ states(motor_sensor) if has_motor_sensor else 'n/a' }}
                                    entity_id: "{{ repeat.item }}"
                                    domain: cover

                        # Wait for movement to complete.
                        # continue_on_timeout: true — if the cover stalls, log and continue.
                        - wait_template: >
                            {% if has_motor_sensor %}
                              {{ states(motor_sensor) | lower == 'stop' }}
                            {% else %}
                              {% if resolved_direction == 'open' %}
                                {{
                                  states(repeat.item) not in ['opening', 'closing'] and
                                  (state_attr(repeat.item, 'current_position') | int(-1)) >= (target_position | int)
                                }}
                              {% else %}
                                {{
                                  states(repeat.item) not in ['opening', 'closing'] and
                                  (state_attr(repeat.item, 'current_position') | int(101)) <= (target_position | int)
                                }}
                              {% endif %}
                            {% endif %}
                          timeout:
                            seconds: "{{ timeout }}"
                          continue_on_timeout: true

                        - choose:
                            - conditions: "{{ debug_logging }}"
                              sequence:
                                - action: logbook.log
                                  data:
                                    name: Sequential Cover Control
                                    message: >
                                      {% if wait.completed %}
                                        Completed {{ repeat.item }}
                                      {% else %}
                                        Timeout {{ repeat.item }} — continuing anyway
                                      {% endif %}
                                      | final_position={{ state_attr(repeat.item, 'current_position') }}
                                      | motor_state={{ states(motor_sensor) if has_motor_sensor else 'n/a' }}
                                    entity_id: "{{ repeat.item }}"
                                    domain: cover

                        # Extra 1s delay after set_cover_position to let the cover settle
                        - choose:
                            - conditions: "{{ use_set_position }}"
                              sequence:
                                - delay:
                                    seconds: 1

                        # Delay between covers — only when movement completed, skip on last
                        - choose:
                            - conditions: "{{ delay > 0 and not repeat.last }}"
                              sequence:
                                - delay:
                                    seconds: "{{ delay }}"

                  default:
                    # Movement did not start within start_wait seconds — log and skip
                    - choose:
                        - conditions: "{{ debug_logging }}"
                          sequence:
                            - action: logbook.log
                              data:
                                name: Sequential Cover Control
                                message: >
                                  Skipped {{ repeat.item }} — did not start moving within {{ start_wait }}s
                                  | cover_state={{ states(repeat.item) }}
                                  | motor_state={{ states(motor_sensor) if has_motor_sensor else 'n/a' }}
                                entity_id: "{{ repeat.item }}"
                                domain: cover
                            - action: system_log.write
                              data:
                                level: warning
                                logger: homeassistant.components.script.sequential_cover_control
                                message: >
                                  Skipped {{ repeat.item }} — did not start moving within {{ start_wait }}s

mode: single
